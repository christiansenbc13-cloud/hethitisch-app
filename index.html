<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hethitisch Lernen</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Cuneiform&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <header>
    <h1>Hethitisch Lernen</h1>
    <p class="subtitle">KUB 14.14 · CTH 378</p>
    <div id="xp-bar-container">
      <span>XP: <span id="xp">0</span></span>
      <div id="xp-bar"><div id="xp-fill"></div></div>
      <span>🔥 Streak: <span id="streak-count">0</span></span>
    </div>
  </header>
  <div id="action-bar">
    <input type="file" id="file-input" accept=".js,.json" style="display:none">
    <button class="action-btn" id="import-btn">⬆ Importieren</button>
    <button class="action-btn" id="delete-btn">🗑 Import löschen</button>
  </div>
  <div id="stats-bar">
    <span id="stat-total">– Vokabeln</span>
    <span id="stat-learned">– gelernt</span>
    <span id="stat-due">– fällig</span>
  </div>
  <div id="round-bar">
    <div id="round-label">Runde <span id="round-num">0</span>/10</div>
    <div id="round-track"><div id="round-fill"></div></div>
    <div id="daily-label">Heute: <span id="daily-rounds">0</span> Runden 🎯</div>
  </div>
  <nav id="module-nav">
    <button class="module-btn active" data-mode="vocab">📖 Vokabeln</button>
    <button class="module-btn" data-mode="cloze">✏️ Lückentext</button>
    <button class="module-btn" data-mode="order">🔢 Reihenfolge</button>

<button class="module-btn" data-mode="grammar">📐 Grammatik</button>
    <button class="module-btn" data-mode="logo">📜 Logogramme</button>
  </nav>
  <main id="quiz-container">
    <div id="card">
      <div id="exercise-area"></div>
      <button id="next-btn" style="display:none">Weiter →</button>
    </div>
  </main>
</div>
<script src="data.js"></script>
<script src="srs.js"></script>
<script src="app.js"></script>
</body>
</html>
